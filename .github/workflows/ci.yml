name: CI — typecheck, lint & test

# PR gate. Pushes to main are handled by deploy.yml (which re-runs check before
# deploying), so we don't double-run here.
on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: typecheck + lint + format + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          # Pin so a future Bun release can't silently change test-runner
          # behavior under us. Bump deliberately.
          bun-version: "1.3.8"

      - name: Cache bun install
        uses: actions/cache@v6
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # typecheck + eslint + prettier --check + unit + integration. The
      # integration layer boots the bridge in a hermetic cwd (no .env, no
      # Supabase) — no external services, no spend.
      - name: Check
        run: bun run check
