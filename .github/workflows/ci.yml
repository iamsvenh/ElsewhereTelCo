name: CI — typecheck & test

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened]

# Cancel a superseded run when a newer commit lands on the same ref.
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: typecheck + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          # Pin so a future Bun release can't silently change test-runner
          # behavior under us. Bump deliberately.
          bun-version: "1.3.8"

      - name: Cache bun install
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # typecheck + unit + integration. The integration layer boots the bridge
      # in a hermetic cwd (no .env, no Supabase) — no external services needed.
      - name: Check
        run: bun run check
