name: Deploy (main → production)

# CD. On merge to main: re-verify, apply migrations, then deploy the bridge.
# Each stage gates the next, so nothing ships unless the suite is green and the
# schema applied cleanly.
on:
  push:
    branches: [main]

concurrency:
  group: deploy-production
  cancel-in-progress: false # never cancel a deploy mid-flight

jobs:
  check:
    name: typecheck + lint + format + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.8"
      - name: Cache bun install
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-
      - run: bun install --frozen-lockfile
      - run: bun run check

  migrate:
    name: apply Supabase migrations (prod)
    needs: check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - name: Link + push migrations
        # Project ref is not secret (it's in infra.md) — hardcoded to keep the
        # secret count down. If a staging project is ever added, parameterize it.
        run: |
          supabase link --project-ref mtvlkjcdfluocapoyvdc
          supabase db push
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}

  deploy:
    name: deploy bridge to Railway
    needs: migrate # schema first, then the code that depends on it
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.8"
      # railway up uploads this checkout and builds on Railway (RAILPACK, per
      # railway.json). --ci waits for the build and fails the job if it fails.
      - name: Deploy
        run: bunx @railway/cli@latest up --service bridge --ci
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
